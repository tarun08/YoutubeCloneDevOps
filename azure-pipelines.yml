# azure-pipelines.yml
trigger:
  branches:
    include:
      - main  # Trigger pipeline on pushes to main branch

pool:
  name: 'Default'

variables:
  buildConfiguration: 'Release'
  nodeVersion: '18.x'

steps:
# Install Node.js
- task: UseNode@1
  inputs:
    checkLatest: true
  displayName: 'Install Node.js'

# Restore npm cache (optional but saves time)
- task: Cache@2
  inputs:
    key: 'npm | "$(Agent.OS)" | package-lock.json'
    path: $(NPM_CONFIG_CACHE)
    cacheHitVar: CACHE_RESTORED
  displayName: 'Restore npm cache'

# Install dependencies
- script: |
    npm install
  displayName: 'Install npm packages'

# Build the React app
- script: |
    npm run build
  displayName: 'Build React app'

# Copy build to artifact staging
- script: |
    mkdir -p $(Build.ArtifactStagingDirectory)
    cp -r build/* $(Build.ArtifactStagingDirectory)/
  displayName: 'Copy build to staging directory'

# Clean node_modules to save disk space
- script: |
    rm -rf node_modules
  displayName: 'Clean node_modules to save disk'

# Publish build artifact
- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
    ArtifactName: 'drop'
    publishLocation: 'Container'

# Deploy to Azure Web App (Linux)
- task: AzureRmWebAppDeployment@5
  inputs:
    ConnectionType: 'AzureRM'
    azureSubscription: 'Tarun Subscription(783dc097-8c71-4893-89b3-2e62720fd922)'
    appType: 'webAppLinux'
    WebAppName: 'youtube-clone-web-app'
    packageForLinux: '$(Build.ArtifactStagingDirectory)'
    RuntimeStack: 'NODE|18-lts'
    DeploymentTypeLinux: 'oneDeploy'