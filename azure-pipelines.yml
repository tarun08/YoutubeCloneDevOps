# azure-pipelines.yml
trigger:
  branches:
    include:
      - main  # Trigger pipeline on pushes to main branch

pool:
  name: Default

variables:
  buildConfiguration: 'Release'
  nodeVersion: '18.x'  # Use Node 18, compatible with react-scripts

steps:
# Install Node.js
- task: NodeTool@0
  inputs:
    versionSpec: '$(nodeVersion)'
    checkLatest: true
  displayName: 'Install Node.js 18.x'

# Restore npm cache (optional, speeds up CI)
- task: Cache@2
  inputs:
    key: 'npm | "$(Agent.OS)" | package-lock.json'
    path: $(NPM_CONFIG_CACHE)
    cacheHitVar: CACHE_RESTORED
  displayName: 'Restore npm cache'

# Clean workspace (optional, prevent old node_modules issues)
- script: |
    rm -rf node_modules package-lock.json
  displayName: 'Clean workspace before install'

# Install dependencies using npm ci (safer for CI)
- script: |
    npm ci
  displayName: 'Install npm packages'

# Run tests (optional)
- script: |
    npm test -- --watchAll=false
  displayName: 'Run tests'

# Build the React app with increased memory (for large apps)
- script: |
    export NODE_OPTIONS=--max-old-space-size=4096
    npm run build
  displayName: 'Build React app with increased memory'

# Copy build to artifact staging directory
- script: |
    mkdir -p $(Build.ArtifactStagingDirectory)
    cp -r build/* $(Build.ArtifactStagingDirectory)/
  displayName: 'Copy build to staging directory'

# Clean node_modules to save disk space
- script: |
    rm -rf node_modules
  displayName: 'Clean node_modules to save disk'

# Publish build artifact
- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
    ArtifactName: 'drop'
    publishLocation: 'Container'

# Deploy to Azure Web App (Linux)
- task: AzureRmWebAppDeployment@5
  inputs:
    ConnectionType: 'AzureRM'
    azureSubscription: 'Tarun Subscription(783dc097-8c71-4893-89b3-2e62720fd922)'
    appType: 'webAppLinux'
    WebAppName: 'youtube-clone-web-app'
    packageForLinux: '$(Build.ArtifactStagingDirectory)'
    RuntimeStack: 'NODE|18-lts'
    DeploymentTypeLinux: 'oneDeploy'